version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_hackathon
    restart: always
    environment:
      MYSQL_DATABASE: hackathon_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_dev
      MYSQL_PASSWORD: password_dev
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
