<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="styles.css">

    <title>Toka2Play</title>
</head>

<body class="toka-body">
    <div class="mobile-app-container">

        <!-- Pestañas que cambian -->
        <input type="radio" name="main-tabs" id="tab-minijuegos" class="d-none" checked>
        <input type="radio" name="main-tabs" id="tab-tienda" class="d-none">
        <input type="radio" name="main-tabs" id="tab-trivias" class="d-none">

        <!-- Zona superior -->
        <header class="app-header d-flex justify-content-between align-items-start">
            <div class="profile-section d-flex flex-column align-items-center">
                <button class="icon-btn profile-pic-btn">
                    <img src="/images/logoUsuario.png" alt="Usuario" class="profile-pic">
                </button>
                <div class="profile-level">
                    <span>Lvl 69</span>
                </div>
            </div>

            <div class="ranking-section pt-2">
                <button class="icon-btn"><img src="/images/ranking.png" alt="Ranking"></button>
            </div>

            <div class="rewards-section d-flex flex-column align-items-center">
                <div class="rewards-icons d-flex align-items-center">
                    <button class="icon-btn"><img src="/images/tokatokens.png" alt="Tokatokens"
                            class="reward-icon"></button>
                    <button class="icon-btn"><img src="/images/toKash.png" alt="ToKash" class="reward-icon"></button>
                    <button class="icon-btn"><img src="/images/recompensas.png" alt="Recompensas"
                            class="reward-icon"></button>
                </div>
            </div>
        </header>

        <!-- Zona mensaje usuario y notificaciones -->
        <section class="greeting-section d-flex justify-content-between align-items-center mt-3">
            <h1 class="greeting-title">Hola User</h1>
            <div class="notification-icon">
                <button class="icon-btn"><img src="/images/logoNotificaciones.png" alt="Notificaciones"
                        class="notification-icon"></button>
            </div>
        </section>

        <!-- Zona mensaje toka2play -->
        <div class="question-section mt-1">
            <h2 class="question-subtitle">¿Qué toka jugar hoy?</h2>
        </div>


        <main class="content-overlay mt-3 d-flex flex-column flex-grow-1" id="minijuegos-section">

            <!-- Juego de la semana -->
            <section class="game-of-week-section w-100">
                <div class="section-title-box">
                    <h3>Juego de la semana</h3>
                </div>

                <div class="featured-game-card">
                    <img src="/images/logoSnake.jpg"
                        alt="Snake"><!-- Aquí se muestra el juego de la semana, por ahora será este -->
                </div>
            </section>

            <!-- Minijuegos -->
            <section class="minigames-section mt-4 flex-grow-1 w-100 text-center">
                <div class="section-title-box mb-3">
                    <h3>Minijuegos</h3>
                </div>
                <div class="games-grid">
                    <div class="game-item">
                        <a href="/snake">
                            <img src="/images/logoSnake.jpg" alt="Snake">
                        </a>
                    </div>
                    <div class="game-item">
                        <a href="/arkanoid">
                            <img src="/images/logoArkanoid.png" alt="Arkanoid">
                        </a>
                    </div>

                    <div class="game-item">
                        <img src="/images/logoDoodle.jpg" alt="Doodle">
                    </div>
                </div>
            </section>
        </main>

        <!-- Trivia semanal-->
        <main class="content-overlay mt-3 d-flex flex-column flex-grow-1" id="trivia-section">

            <!-- Trivia semanal -->
            <section class="game-of-week-section w-100">
                <div class="section-title-box">
                    <h3>Trivia semanal</h3>
                </div>

                <div class="featured-trivia-card">
                    <img src="/images/triviaSemanal.png" alt="Trivia Semanal">
                    <!-- Aquí se muestra la trivia de la semana, al presionar debe mostrar su información y si ya está activa, dejar jugarla-->
                </div>
            </section>

            <!-- Crear trivias -->
            <section class="trivia-section mt-4 flex-grow-1 w-100 text-center">
                <div class="section-title-box mb-3">
                    <h3>Trivias</h3>
                </div>
                <div class="trivia-options-grid">
                    <div class="trivia-option-item">
                        <img src="/images/crearTrivia.png" alt="Crear Trivia">
                    </div>
                    <div class="trivia-option-item">
                        <img src="/images/unirseTrivia.png" alt="Unirse Trivia">
                    </div>
                </div>
            </section>
        </main>

        <!-- Tienda -->
        <main class="content-overlay mt-3 d-flex flex-column flex-grow-1" id="tienda-section">

            <!-- Articulo por tiempo limitado -->
            <section class="game-of-week-section w-100">
                <div class="section-title-box">
                    <h3>Artículo por tiempo limitado</h3>
                </div>

                <div class="featured-tienda-limited-card">
                    <img src="/images/iconoCajero.png" alt="Articulo por tiempo limitado">
                    <!-- Aquí se muestra el articulo por tiempo limitado, al presionar debe dejar comprarlo-->
                </div>
            </section>

            <!-- Articulos a comprar -->
            <section class="tienda-section mt-4 flex-grow-1 w-100 text-center">
                <div class="section-title-box mb-3">
                    <h3>Artículos disponibles</h3>
                </div>
                <div class="tienda-options-grid">
                    <div class="tienda-option-item">
                        <img src="/images/crystalPaddle.png" alt="articulo1">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/controlNES.png" alt="articulo2">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/NeonPaddle.png" alt="articulo3">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/slowDown.png" alt="articulo4">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/timeBonus.png" alt="articulo5">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/gemBall.png" alt="articulo6">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/tokaTotalPaddle.png" alt="articulo7">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/tokaDespensaPaddle.png" alt="articulo8">
                    </div>

                    <div class="tienda-option-item">
                        <img src="/images/tokaSnakeBody.png" alt="articulo9">
                    </div>
                </div>
            </section>
        </main>

        <!-- Barra inferior -->
        <nav class="bottom-nav">
            <!-- Icono Minijuegos -->
            <label for="tab-minijuegos" class="nav-btn m-0">
                <img src="/images/logoMinijuegos.png" alt="Minijuegos">
            </label>

            <!-- Icono Tienda -->
            <div class="main-nav-btn-wrapper">
                <label for="tab-tienda" class="nav-btn main-nav-btn m-0">
                    <div class="nav-center-bump">
                        <img src="/images/logoTienda.png" alt="Tienda">
                    </div>
                </label>
            </div>

            <!-- Icono Trivias -->
            <label for="tab-trivias" class="nav-btn m-0">
                <img src="/images/logoTrivias.png" alt="Trivias">
            </label>
        </nav>

    </div>
</body>

</html>
