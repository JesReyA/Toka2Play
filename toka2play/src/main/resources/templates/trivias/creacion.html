<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="/css/stylesMain.css">

    <title>Crear Trivia - Toka2Play</title>

    <style>
        .trivia-form-card {
            background: rgba(30, 40, 60, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 2px 15px rgba(255,255,255,0.05);
            color: white;
            margin: auto;
            width: 100%;
        }

        .trivia-label {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
            margin-top: 20px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .trivia-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: #00f0ff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .trivia-input::placeholder {
            color: rgba(0, 240, 255, 0.4);
        }
        .trivia-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .trivia-help-text {
            font-size: 0.75rem;
            color: #a0c4d8;
            line-height: 1.4;
            margin-top: 2px;
            margin-bottom: 0px;
        }

        .trivia-select {
            display: flex;
            align-items: center;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 12px 18px;
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15), inset 0 0 8px rgba(0, 255, 136, 0.1);
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .custom-range-container {
            margin-top: 10px;
            position: relative;
        }
        .custom-range {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, #00f0ff 50%, rgba(255,255,255,0.2) 50%);
            border-radius: 5px;
            outline: none;
        }
        .custom-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #00f0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 12px #00f0ff;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.85rem;
            color: white;
            padding: 0 5px;
        }
        .range-labels span {
            transition: color 0.2s;
        }
        .range-labels .active-label {
            color: #00f0ff;
            font-weight: 600;
        }

        .time-blocks {
            display: flex;
            width: 140px;
            height: 24px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .time-block { flex: 1; }
        .time-block-cyan { background: #00f0ff; }
        .time-block-yellow { background: #ffd700; }
        .time-block-red { background: #ff4757; }

        .difficulty-segmented {
            display: flex;
            width: 180px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 2px;
        }
        .difficulty-btn {
            flex: 1;
            text-align: center;
            padding: 4px 5px;
            font-size: 0.75rem;
            color: #a0c4d8;
            cursor: pointer;
            border-radius: 18px;
            transition: all 0.3s;
        }
        .difficulty-btn.active {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(0,240,255,0.2);
        }

        .room-code {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed rgba(0, 240, 255, 0.4);
            border-right: none;
            color: #00f0ff;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 0 20px;
            letter-spacing: 3px;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
        }
        .btn-copy-code {
            background: rgba(0, 240, 255, 0.15);
            border: 2px dashed rgba(0, 240, 255, 0.4);
            color: #00f0ff;
            font-size: 1.2rem;
            padding: 0 18px;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        .btn-copy-code:hover {
            background: rgba(0, 240, 255, 0.3);
        }

        .btn-submit-trivia {
            width: 100%;
            margin-top: 30px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: all 0.3s;
        }
        .btn-submit-trivia:hover {
            background: rgba(0, 255, 136, 0.25);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
        }

        /* Top Bar Adjustments for this view */
        .top-bar-custom {
            padding: 20px 25px 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar-custom .back-btn {
            color: white;
            font-size: 1.1rem;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body class="toka-body">
    <div class="mobile-app-container">

        <!-- Header: Back button & Game Master Mode -->
        <div class="top-bar-custom">
            <a href="/" class="back-btn"><i class="fa-solid fa-chevron-left"></i> BACK</a>
            <div class="d-flex flex-column align-items-end" style="color: #00ff88; font-size: 0.8rem; font-weight: 600;">
                <span class="text-white" style="font-size: 0.7rem; font-weight: 400; opacity: 0.8;">MODO</span>
                GAME MASTER
            </div>
        </div>

        <div class="scrollable-content p-3 h-100 d-flex flex-column justify-content-center" style="padding-bottom: 20px;">
            
            <!-- CENTRAL CARD -->
            <div class="trivia-form-card">
                
                <label class="trivia-label mt-0">NOMBRE DE LA TRIVIA</label>
                <input type="text" class="trivia-input" placeholder="ej: Noche de Gamers Retro">

                <label class="trivia-label">CONFIGURACIÓN AUTOMÁTICA DE PREGUNTAS</label>
                <p class="trivia-help-text">Configuración automática de preguntas para configurar el pool de preguntas. Esto balanceará la dificultad de forma balanceada con respecto al tema.</p>

                <label class="trivia-label">SELECCIONAR CATEGORÍA</label>
                <div class="trivia-select">
                    <i class="fa-solid fa-gamepad me-3"></i> VIDEOJUEGOS 
                    <i class="fa-solid fa-chevron-down ms-auto" style="font-size: 1rem;"></i>
                </div>

                <label class="trivia-label">CANTIDAD DE PREGUNTAS</label>
                <div class="custom-range-container">
                    <input type="range" class="custom-range" id="preguntas-slider" min="10" max="20" step="5" value="15" oninput="updateSlider()">
                    <div class="range-labels">
                        <span id="lb-10">10</span>
                        <span id="lb-15" class="active-label">15</span>
                        <span id="lb-20">20</span>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <label class="trivia-label mt-0 mb-0">TIEMPO POR PREGUNTA</label>
                    <div class="time-blocks">
                        <div class="time-block time-block-cyan"></div>
                        <div class="time-block time-block-yellow"></div>
                        <div class="time-block time-block-red"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <label class="trivia-label mt-0 mb-0">DIFICULTAD AUTOMÁTICA</label>
                    <div class="difficulty-segmented">
                        <div class="difficulty-btn active">Fácil</div>
                        <div class="difficulty-btn">Medio</div>
                        <div class="difficulty-btn">Challenge</div>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top border-secondary border-opacity-25">
                    <label class="trivia-label mt-0 text-center" style="color: #00f0ff;"><i class="fa-solid fa-key me-2"></i>CÓDIGO DE SALA</label>
                    <div class="d-flex justify-content-center mt-2" style="height: 50px;">
                        <div class="room-code" id="roomCodeText">#T8X-99P</div>
                        <button class="btn-copy-code" title="Copiar código" onclick="copyRoomCode()"><i class="fa-regular fa-copy"></i></button>
                    </div>
                    <p class="text-center text-secondary mt-2 mb-0" style="font-size: 0.75rem;">Comparte este código con los demás para que se unan a la trivia.</p>
                </div>

                <button class="btn-submit-trivia mt-4">INICIALIZAR TRIVIA</button>
                
            </div>

        </div>

    </div>

    <script>
        function updateSlider() {
            const slider = document.getElementById('preguntas-slider');
            const val = slider.value;
            const min = 10;
            const max = 20;
            
            // Calculate percentage for background gradient
            const percent = ((val - min) / (max - min)) * 100;
            slider.style.background = `linear-gradient(to right, #00f0ff ${percent}%, rgba(255,255,255,0.2) ${percent}%)`;
            
            // Update active label
            document.getElementById('lb-10').classList.remove('active-label');
            document.getElementById('lb-15').classList.remove('active-label');
            document.getElementById('lb-20').classList.remove('active-label');
            
            document.getElementById(`lb-${val}`).classList.add('active-label');
        }

        // Segmented control logic for Demo
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Copy room code to clipboard
        function copyRoomCode() {
            const code = document.getElementById('roomCodeText').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.btn-copy-code i');
                btn.classList.remove('fa-copy', 'fa-regular');
                btn.classList.add('fa-check', 'fa-solid');
                setTimeout(() => {
                    btn.classList.remove('fa-check', 'fa-solid');
                    btn.classList.add('fa-copy', 'fa-regular');
                }, 2000);
            });
        }
    </script>
</body>
</html>
