<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="/css/stylesMain.css">

    <title>Unirse a Trivia - Toka2Play</title>

    <style>
        .trivia-form-card {
            background: rgba(30, 40, 60, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 35px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 2px 15px rgba(255,255,255,0.05);
            color: white;
            margin: auto;
            width: 100%;
            text-align: center;
        }

        .trivia-title {
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #00f0ff;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .code-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00f0ff;
            border-radius: 12px;
            padding: 15px 20px;
            color: #00f0ff;
            font-size: 1.8rem;
            font-weight: 500;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.1);
            transition: all 0.3s;
        }
        .code-input::placeholder {
            color: rgba(0, 240, 255, 0.5);
            font-weight: 300;
            letter-spacing: 0px;
        }
        .code-input:focus {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4), inset 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .trivia-help-text {
            font-size: 0.95rem;
            color: #ffffff;
            margin-top: 15px;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn-submit-trivia {
            width: 100%;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: all 0.3s;
        }
        .btn-submit-trivia:hover {
            background: rgba(0, 255, 136, 0.25);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
        }

        /* Top Bar Adjustments for this view */
        .top-bar-custom {
            padding: 20px 25px 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar-custom .back-btn {
            color: white;
            font-size: 1.1rem;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body class="toka-body">
    <div class="mobile-app-container">

        <!-- Header: Back button & Join Mode -->
        <div class="top-bar-custom">
            <a href="/" class="back-btn"><i class="fa-solid fa-chevron-left"></i> BACK</a>
            <div class="d-flex flex-column align-items-end" style="color: #00ff88; font-size: 0.8rem; font-weight: 600;">
                <span class="text-white" style="font-size: 0.7rem; font-weight: 400; opacity: 0.8;">UNIRSE A</span>
                TRIVIA
            </div>
        </div>

        <div class="scrollable-content p-3 h-100 d-flex flex-column justify-content-center" style="padding-bottom: 40px;">
            
            <!-- CENTRAL CARD -->
            <div class="trivia-form-card">
                
                <h2 class="trivia-title">INGRESA CÓDIGO DE TRIVIA</h2>
                
                <input type="text" class="code-input" placeholder="ej: TRV-XYZ-123" maxlength="15" style="text-transform: uppercase;">
                
                <p class="trivia-help-text">Pídele el código a tu Game Master o amigo.</p>

                <div id="error-msg" style="display:none; color: #ff4757; margin-bottom: 15px; font-weight: 500; font-size: 0.95rem;"></div>

                <button class="btn-submit-trivia" onclick="unirseTrivia()">UNIRSE A TRIVIA</button>
                
            </div>

        </div>

    </div>

    <script>
        // Formatear el input para que siempre esté en mayúsculas
        const codeInput = document.querySelector('.code-input');
        codeInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        async function unirseTrivia() {
            const code = codeInput.value.trim();
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.querySelector('.btn-submit-trivia');

            if (!code) {
                errorMsg.textContent = 'Por favor, ingresa un código válido.';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            submitBtn.textContent = 'BUSCANDO TRIVIA...';
            submitBtn.disabled = true;

            try {
                // El código incluye #, así que hay que codificar la URI para enviarlo como path param
                const response = await fetch('/api/trivia/' + encodeURIComponent(code));
                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Código incorrecto o trivia inexistente.');
                }

                // Guardar la información en la sesión y redirigir
                sessionStorage.setItem('triviaQuestions', JSON.stringify(data.questions));
                sessionStorage.setItem('triviaNombre', data.nombre);
                sessionStorage.setItem('triviaCodigo', data.codigo);

                window.location.href = '/trivias/contestando';

            } catch(err) {
                errorMsg.textContent = "⚠️ " + err.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.textContent = 'UNIRSE A TRIVIA';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
