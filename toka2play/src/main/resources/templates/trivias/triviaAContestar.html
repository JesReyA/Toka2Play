<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">

    <link rel="stylesheet" href="/css/stylesMain.css">

    <title>Contestando Trivia - Toka2Play</title>

    <style>
        .trivia-play-card {
            background: rgba(30, 40, 60, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px 20px 25px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 2px 15px rgba(255, 255, 255, 0.05);
            color: white;
            margin: auto;
            width: 100%;
        }

        .trivia-header {
            text-align: center;
        }

        .playing-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #00f0ff;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .question-number {
            font-size: 0.95rem;
            color: white;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Circular timer */
        .timer-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 20px auto;
        }

        .timer-ring {
            width: 120px;
            height: 120px;
            transform: rotate(-90deg);
        }

        .timer-ring__circle {
            stroke: #00f0ff;
            stroke-width: 6;
            fill: transparent;
            /* Circumference corresponds to r=54 -> ~339.29 */
            stroke-dasharray: 339;
            stroke-dashoffset: 75;
            /* This simulates the time passing */
            filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.8));
            stroke-linecap: round;
        }

        .timer-ring__bg {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 6;
            fill: transparent;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 700;
            color: #00f0ff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            font-family: "Outfit", sans-serif;
            letter-spacing: 1px;
        }

        /* Pregunta */
        .question-text-container {
            margin-bottom: 25px;
        }

        .question-prefix {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
            text-transform: uppercase;
        }

        .question-body {
            font-size: 1.15rem;
            font-weight: 400;
            line-height: 1.35;
        }

        /* Grid de Respuestas */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .answer-btn {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 14px 10px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
            text-transform: uppercase;
        }

        .answer-btn i {
            font-size: 1.5rem;
            margin-right: 12px;
            margin-left: 5px;
            width: 25px;
            text-align: center;
        }

        /* Colores Específicos */
        .ans-cyan {
            border-color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.25), inset 0 0 10px rgba(0, 240, 255, 0.15);
        }

        .ans-cyan i {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }

        .ans-purple {
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.25), inset 0 0 10px rgba(192, 132, 252, 0.15);
        }

        .ans-purple i {
            color: #c084fc;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.6);
        }

        .ans-yellow {
            border-color: #ffd700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.25), inset 0 0 10px rgba(255, 215, 0, 0.15);
        }

        .ans-yellow i {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        .ans-orange {
            border-color: #ff9f43;
            box-shadow: 0 0 12px rgba(255, 159, 67, 0.25), inset 0 0 10px rgba(255, 159, 67, 0.15);
        }

        .ans-orange i {
            color: #ff9f43;
            text-shadow: 0 0 10px rgba(255, 159, 67, 0.6);
        }

        .answer-btn:active {
            transform: scale(0.96);
        }

        /* Puntos y Racha */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .stat-pill {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid #00f0ff;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            text-transform: uppercase;
        }

        .stat-pill span {
            color: #00f0ff;
        }

        /* Header customizado */
        .top-bar-custom {
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Ajustar grid en pantallas muy chicas */
        @media (max-width: 380px) {
            .answers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="toka-body">
    <div class="mobile-app-container">

        <!-- Top Header as requested in mockup -->
        <div class="top-bar-custom">
            <!-- Back Btn -->
            <a href="/" class="text-white text-decoration-none d-flex align-items-center gap-1"
                style="font-weight: 600; font-size: 1rem;">
                <i class="fa-solid fa-chevron-left"></i> BACK
            </a>

            <!-- Avatar y Nivel -->
            <div class="d-flex align-items-center gap-2" style="font-size: 0.8rem; margin-left: 5px;">
                <img src="/images/logoUsuario.png" alt="User"
                    style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid #00f0ff;">
                <div class="d-flex flex-column d-none d-sm-flex">
                    <span class="text-white fw-bold">Lvl 69</span>
                    <div style="width: 35px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;">
                        <div style="width: 60%; height: 100%; background: #00f0ff; border-radius: 2px;"></div>
                    </div>
                </div>
            </div>

            <!-- Monedas -->
            <div class="d-flex align-items-center gap-1 text-white" style="font-size: 0.95rem; font-weight: 600;">
                <img src="/images/tokatokens.png" width="20"> 1250
            </div>

            <!-- Notificación -->
            <i class="fa-regular fa-bell text-white" style="font-size: 1.2rem;"></i>

            <!-- Modo Actual -->
            <div class="d-flex flex-column align-items-end"
                style="color: #00ff88; font-size: 0.75rem; font-weight: 600; line-height: 1.1;">
                <span class="text-white" style="font-size: 0.65rem; font-weight: 400; opacity: 0.8;">JUGANDO</span>
                TRIVIA
            </div>
        </div>

        <!-- Contenido principal interactivo -->
        <div class="scrollable-content p-3 h-100 d-flex flex-column justify-content-center"
            style="padding-bottom: 20px;">

            <div class="trivia-play-card">

                <div class="trivia-header">
                    <div class="playing-title">JUGANDO TRIVIA: NOCHE DE GAMERS RETRO</div>
                    <div class="question-number">PREGUNTA 1/15</div>
                </div>

                <!-- Timer -->
                <div class="timer-container">
                    <svg class="timer-ring">
                        <circle class="timer-ring__bg" cx="60" cy="60" r="54"></circle>
                        <circle class="timer-ring__circle" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <div class="timer-text">0:12</div>
                </div>

                <!-- Pregunta -->
                <div class="question-text-container">
                    <div class="question-prefix">PREGUNTA 1:</div>
                    <div class="question-body">¿Cuál fue el primer videojuego arcade comercial exitoso?</div>
                </div>

                <!-- Botones de Respuestas -->
                <div class="answers-grid">
                    <div class="answer-btn ans-cyan">
                        <!-- Pong icon representation -->
                        <i class="fa-solid fa-table-tennis-paddle-ball"></i> PONG
                    </div>
                    <div class="answer-btn ans-purple">
                        <!-- Space Invaders representation -->
                        <i class="fa-brands fa-space-awesome"></i> SPACE INVADERS
                    </div>
                    <div class="answer-btn ans-yellow">
                        <!-- Pac-Man representation -->
                        <i class="fa-solid fa-chart-pie" style="transform: rotate(-45deg);"></i> PAC-MAN
                    </div>
                    <div class="answer-btn ans-orange">
                        <!-- Asteroids representation -->
                        <i class="fa-solid fa-meteor"></i> ASTEROIDS
                    </div>
                </div>

                <!-- Estadísticas de la partida en vivo -->
                <div class="stats-row">
                    <div class="stat-pill">Puntos: <span>0</span></div>
                    <div class="stat-pill">Racha: <span>0x</span></div>
                </div>

            </div>

        </div>

    </div>
</body>

</html>
