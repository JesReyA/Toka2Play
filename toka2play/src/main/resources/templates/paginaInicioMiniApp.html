<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tipo de letra -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/stylesMiniApp.css">

    <title>Toka2Play</title>
</head>

<body>
    <!-- Contenedor principal -->
    <div class="app-container d-flex flex-column justify-content-center align-items-center min-vh-100 w-100">
        <div class="content-wrapper w-100 px-4 text-center">

            <!-- Logo -->
            <div id="Logo" class="mb-5">
                <img src="logotoka.png" alt="Logo Toka2Play" class="img-fluid logo-img">
            </div>

            <!-- Esquina superior izquierda -->
            <div id="Esquina_superior_izquierda" class="position-absolute top-0 start-0">
                <img src="logotoka1.png" alt="Esquina superior izquierda" class="corner-img pt-0 ps-0">
            </div>

            <!-- Esquina superior derecha -->
            <div id="Esquina_superior_derecha" class="position-absolute top-0 end-0">
                <img src="logotoka2.png" alt="Esquina superior derecha" class="corner-img pt-0 pe-0">
            </div>

            <!-- Esquina inferior izquierda -->
            <div id="Esquina_inferior_izquierda" class="position-absolute bottom-0 start-0">
                <img src="logotoka3.png" alt="Esquina inferior izquierda" class="corner-img pb-0 ps-0">
            </div>

            <!-- Frase -->
            <div id="Frase" class="mb-5 px-sm-3 px-1">
                <h2 class="subtitle-text">Donde jugar y competir te generan<br>recompensas reales.</h2>
            </div>

            <!-- Botones -->
            <div id="Botones" class="d-flex flex-column gap-4 px-3 px-sm-5 mx-auto" style="max-width: 400px;">
                <button class="btn-toka btn-primary-toka w-100">Inicia sesión</button>
                <button class="btn-toka btn-secondary-toka w-100">Regístrate</button>
            </div>

        </div>
    </div>
</body>

</html>
