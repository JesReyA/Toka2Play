<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARKANOID</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #111;
            color: #fff;
            touch-action: none; /* Previene scroll no deseado al jugar en móvil */
        }

        canvas {
            border: 4px solid #fff;
            border-bottom: transparent;
            margin: 0 auto;
            display: block;
            background: url('/images/bkg.png') repeat;
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        .controls {
            margin-top: 20px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            font-size: 2rem;
            width: 80px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s;
        }

        .control-btn:active {
            background: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
            transform: scale(0.95);
        }

        .btn-back {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #00f0ff;
        }
    </style>
</head>

<body>
    <div class="container-fluid min-vh-100 d-flex flex-column align-items-center justify-content-center py-3">
        
        <!-- Top bar with Back Button -->
        <div class="w-100 mb-3 d-flex justify-content-start" style="max-width: 448px;">
            <a href="/" class="btn-back"><i class="fa-solid fa-chevron-left me-2"></i> BACK</a>
        </div>

        <div class="position-relative">
            <canvas></canvas>
            
            <!-- Game Over Screen -->
            <div id="gameOverScreen" class="position-absolute top-50 start-50 translate-middle bg-dark text-white p-4 rounded text-center d-none" style="border: 2px solid #ff4757; box-shadow: 0 0 15px rgba(255, 71, 87, 0.8); z-index: 10; min-width: 250px;">
                <h3 class="mb-3" style="color: #ff4757;"><i class="fa-solid fa-gamepad"></i> Game Over</h3>
                <button class="btn btn-outline-info mb-2 w-100" onclick="document.location.reload()">
                    <i class="fa-solid fa-rotate-right"></i> Volver a Jugar
                </button>
                <a href="/" class="btn btn-outline-secondary w-100">
                    <i class="fa-solid fa-house"></i> Menú Principal
                </a>
            </div>
        </div>

        <!-- Mobile Controls (Sólo visibles en sm y xs gracias a d-md-none) -->
        <div class="controls w-100 d-flex justify-content-between px-3 d-md-none" style="max-width: 448px;">
            <div class="control-btn" id="btn-left">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div class="control-btn" id="btn-right">
                <i class="fa-solid fa-arrow-right"></i>
            </div>
        </div>
    </div>

    <img hidden id="sprite" src="/images/sprite.png" alt="Sprite ARKANOID">
    <img hidden id="bricks" src="/images/bricks.png" alt="Sprite ARKANOID">

    <script>
        const canvas = document.querySelector('canvas')
        const ctx = canvas.getContext('2d')

        const $sprite = document.querySelector('#sprite')
        const $bricks = document.querySelector('#bricks')

        canvas.width = 448
        canvas.height = 400

        //variables de la pelota
        const ballRadius = 4

        let x = canvas.width / 2
        let y = canvas.height - 30

        //velocidad de la pelota
        let dx = 2
        let dy = -2

        //variables de la paleta
        const paddleHeight = 10
        const paddleWidth = 50
        let paddleX = (canvas.width - paddleWidth) / 2
        let paddleY = canvas.height - paddleHeight - 10

        //flags pulsaciones de teclas
        let rightPressed = false
        let leftPressed = false
        
        let isGameOver = false
        let score = 0;

        //Mobile button elements
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        //Variables de los ladrillos
        const brickRowCount = 6
        const brickColumnCount = 12
        const brickWidth = 30
        const brickHeight = 14
        const brickPadding = 2
        const brickOffsetTop = 80
        const brickOffsetLeft = 30
        const bricks = []

        const brickStatus = {
            active: 1,
            broken: 0
        }

        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                //posicion de los ladrillos
                const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft
                const brickY = r * (brickHeight + brickPadding) + brickOffsetTop

                //Asignar color aleatorio a los ladrillos
                const random = Math.floor(Math.random() * 8)

                bricks[c][r] = {
                    x: brickX, y: brickY, status: brickStatus.active, color: random
                }
            }
        }

        //Dibujar la pelota
        function drawBall() {
            ctx.beginPath()
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2)
            ctx.fillStyle = "#fff"
            ctx.fill()
            ctx.closePath()
        }

        function drawPaddle() {
            ctx.fillStyle = "red"
            //se indican coordenadas y dimensiones de la paleta
            //ctx.fillRect(paddleX, paddleY, paddleWidth, paddleHeight)

            ctx.drawImage(
                $sprite, 29, 174, paddleWidth, paddleHeight, paddleX, paddleY, paddleWidth, paddleHeight
            )
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const currentBrick = bricks[c][r]
                    if (currentBrick.status === brickStatus.broken) {
                        continue
                    }

                    const clipX = currentBrick.color * 32

                    ctx.drawImage(
                        $bricks, clipX, 0, brickWidth, brickHeight, currentBrick.x, currentBrick.y, brickWidth, brickHeight
                    )
                }
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const currentBrick = bricks[c][r]
                    if (currentBrick.status === brickStatus.broken) {
                        continue
                    }

                    //Saber si la pelota está en la misma posición X que el ladrillo
                    const isBallSameXAsBrick = x > currentBrick.x && x < currentBrick.x + brickWidth

                    //Saber si la pelota está en la misma posición Y que el ladrillo
                    const isBallTouchingBrick = y + dy > currentBrick.y && y + dy < currentBrick.y + brickHeight

                    if (isBallSameXAsBrick && isBallTouchingBrick) {
                        dy = -dy
                        currentBrick.status = brickStatus.broken
                        score += 100
                    }
                }
            }
        }

        function ballMovement() {
            //colisiones con las paredes derecha e izquierda
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx
            }
            //colisiones con la pared superior
            if (y + dy < ballRadius) {
                dy = -dy
            }

            //Saber si la pelota está en la misma posición X que la paleta
            const isBallSameXAsPaddle = x > paddleX && x < paddleX + paddleWidth

            //Saber si la pelota está en la misma posición Y que la paleta
            const isBallTouchingPaddle = y + dy > paddleY && y + dy < paddleY + paddleHeight

            if (isBallSameXAsPaddle && isBallTouchingPaddle) {
                dy = -dy
            } else if (y + dy > canvas.height - ballRadius) {
                isGameOver = true;
                document.getElementById('gameOverScreen').classList.remove('d-none');
                
                fetch('/api/leaderboard/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idJuego: 3, idUsuario: 1, puntaje: score })
                }).catch(e => console.error(e));
            }

            //mover la pelota
            x += dx
            y += dy
        }
        function paddleMovement() {
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 3
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 3
            }
        }

        function cleanCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height)
        }

        //eventos de teclado y táctiles
        function initEvents() {
            document.addEventListener("keydown", keyDownHandler)
            document.addEventListener("keyup", keyUpHandler)

            //al presionar una tecla
            function keyDownHandler(event) {
                const { key } = event
                if (key === "Right" || key === "ArrowRight") {
                    rightPressed = true
                } else if (key === "Left" || key === "ArrowLeft") {
                    leftPressed = true
                }
            }

            //al soltar una tecla
            function keyUpHandler(event) {
                const { key } = event
                if (key === "Right" || key === "ArrowRight") {
                    rightPressed = false
                } else if (key === "Left" || key === "ArrowLeft") {
                    leftPressed = false
                }
            }

            // Mobile events
            if(btnLeft && btnRight) {
                // Eventos Touch
                btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
                btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });
                
                btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
                btnRight.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });

                // Eventos Mouse (para pantallas pc si se testea simulando móvil)
                btnLeft.addEventListener('mousedown', (e) => { e.preventDefault(); leftPressed = true; });
                btnLeft.addEventListener('mouseup', (e) => { e.preventDefault(); leftPressed = false; });
                btnLeft.addEventListener('mouseleave', (e) => { e.preventDefault(); leftPressed = false; });

                btnRight.addEventListener('mousedown', (e) => { e.preventDefault(); rightPressed = true; });
                btnRight.addEventListener('mouseup', (e) => { e.preventDefault(); rightPressed = false; });
                btnRight.addEventListener('mouseleave', (e) => { e.preventDefault(); rightPressed = false; });
            }
        }

        function draw() {
            if (isGameOver) return;

            cleanCanvas()
            drawBall()
            drawPaddle()
            drawBricks()

            window.requestAnimationFrame(draw)

            collisionDetection()
            ballMovement()
            paddleMovement()
        }

        draw()
        initEvents()
    </script>
</body>

</html>
